<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>녹동고 3-1 자동 시간표</title>
    <style>
        :root { --primary: #007AFF; --bg: #f2f4f7; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 420px; background: white; padding: 20px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1a1a1a; margin: 10px 0 20px; font-size: 1.4rem; }
        .setting-box { background: #f8faff; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e1e8f0; font-size: 1rem; outline: none; }
        .btn-confirm { padding: 0 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .section-title { font-weight: 700; color: #333; margin: 25px 0 12px; display: block; font-size: 1.1rem; }
        .timetable-card { background: #fff; border: 1px solid #e1e8f0; border-radius: 20px; padding: 10px; overflow: hidden; }
        .timetable { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.8rem; table-layout: fixed; }
        .timetable th { color: var(--primary); padding: 10px 0; font-weight: 800; border-bottom: 2px solid #f0f4f8; }
        .timetable td { padding: 12px 2px; border-bottom: 1px solid #f5f5f5; height: 45px; }
        .highlight { color: var(--primary); font-weight: 800; background: #f0f7ff; border-radius: 10px; }
        .meal-box { padding: 20px; background: #f8faff; border-radius: 20px; border: 1px solid #e1e8f0; min-height: 80px; line-height: 1.7; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>☀️ 녹동고 3-1 대시보드</h2>

    <div class="setting-box">
        <div class="input-row">
            <input type="number" id="studentId" placeholder="학번 4자리 입력" onkeyup="if(window.event.keyCode==13){updateByStudentId()}">
            <button class="btn-confirm" onclick="updateByStudentId()">확인</button>
        </div>
    </div>

    <span class="section-title">📅 맞춤형 시간표</span>
    <div class="timetable-card">
        <table class="timetable">
            <thead>
                <tr><th style="width:15%">교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr>
            </thead>
            <tbody id="timetable-content"></tbody>
        </table>
    </div>

    <span class="section-title">🍱 오늘의 급식</span>
    <div class="meal-box" id="meal">불러오는 중...</div>
</div>

<script>
const OFFICE_CODE = "Q10", SCHOOL_CODE = "8490270";

async function updateDisplay() {
    const studentId = document.getElementById("studentId").value;
    const d = new Date();
    const dateStr = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
    
    await loadDataAndRender(studentId);
    updateMeal(dateStr);
}

async function loadDataAndRender(studentId) {
    try {
        const [resTime, resMapping] = await Promise.all([
            fetch('표학급시간.csv'),
            fetch('시간표대응.csv')
        ]);

        const timeText = await resTime.text();
        const mappingText = await resMapping.text();

        // 1. 매핑 데이터 정리 (기초A: [학번들], 기초B: [학번들] ...)
        const mappingRows = mappingText.split('\n').map(r => r.split(','));
        const subjectHeaders = mappingRows[0].map(h => h.trim()); // 과목명들
        const studentMap = {}; // { "기초A": "물리II" } 형태

        for (let i = 1; i < mappingRows.length; i++) {
            const row = mappingRows[i];
            const groupName = row[0].trim(); // 기초A, 기초B 등
            if (!groupName) continue;

            for (let j = 1; j < row.length; j++) {
                const studentsInThisSubject = row[j] || "";
                // 입력한 학번이 해당 과목 칸에 포함되어 있는지 확인
                if (studentId && studentsInThisSubject.includes(studentId)) {
                    studentMap[groupName] = subjectHeaders[j];
                    break;
                }
            }
        }

        // 2. 시간표 렌더링
        const timeRows = timeText.split('\n').map(r => r.split(','));
        const tableBody = document.getElementById("timetable-content");
        let html = "";

        for (let p = 1; p <= 7; p++) {
            html += `<tr><td>${p}</td>`;
            for (let d = 1; d <= 5; d++) {
                let rawSub = timeRows[p] && timeRows[p][d] ? timeRows[p][d].trim() : "-";
                
                // 매핑된 과목이 있으면 교체, 없으면 원래 텍스트(자율 등) 유지
                const finalSub = studentMap[rawSub] || rawSub;
                const isMatching = studentMap[rawSub] ? 'class="highlight"' : '';

                html += `<td ${isMatching}>${finalSub}</td>`;
            }
            html += `</tr>`;
        }
        tableBody.innerHTML = html;

    } catch (e) {
        console.error(e);
        document.getElementById("timetable-content").innerHTML = "<tr><td colspan='6'>데이터 로드 오류</td></tr>";
    }
}

function updateByStudentId() {
    const id = document.getElementById("studentId").value;
    if (id.length === 4) {
        localStorage.setItem("ndhs_id", id);
        updateDisplay();
    } else {
        alert("학번 4자리를 정확히 입력해주세요.");
    }
}

async function updateMeal(dateStr) {
    try {
        const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${OFFICE_CODE}&SD_SCHUL_CODE=${SCHOOL_CODE}&MLSV_YMD=${dateStr}&MMEAL_SC_CODE=2`);
        const data = await res.json();
        if(data.mealServiceDietInfo) {
            document.getElementById("meal").innerHTML = data.mealServiceDietInfo[1].row[0].DDISH_NM.replace(/\([0-9.]+\)/g, "").split('<br/>').join('<br>');
        } else { document.getElementById("meal").innerText = "급식 정보가 없습니다."; }
    } catch { document.getElementById("meal").innerText = "급식 로드 실패"; }
}

window.onload = () => {
    const saved = localStorage.getItem("ndhs_id");
    if(saved) {
        document.getElementById("studentId").value = saved;
    }
    updateDisplay();
};
</script>
</body>
</html>
