<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>녹동고 3-1 대시보드</title>
    <style>
        :root { --primary: #007AFF; --bg: #f2f4f7; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 420px; background: white; padding: 20px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 50px; }
        
        h2 { text-align: center; color: #1a1a1a; margin: 10px 0 20px; font-size: 1.4rem; }
        .setting-box { background: #f8faff; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e1e8f0; font-size: 1rem; outline: none; }
        .btn-confirm { padding: 0 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .section-title { font-weight: 700; color: #333; margin: 25px 0 12px; display: block; font-size: 1.1rem; }
        .timetable-card { background: #fff; border: 1px solid #e1e8f0; border-radius: 20px; padding: 10px; overflow: hidden; }
        .timetable { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.8rem; table-layout: fixed; }
        .timetable td { padding: 12px 2px; border-bottom: 1px solid #f5f5f5; height: 45px; }
        .is-matched { color: var(--primary); font-weight: 800; background: #f0f7ff; border-radius: 10px; }
        
        .meal-box { padding: 20px; background: #f8faff; border-radius: 20px; border: 1px solid #e1e8f0; min-height: 80px; line-height: 1.7; color: #444; }

        /* 게시판 전용 스타일 */
        .board-box { padding: 10px; background: #fff; border-radius: 20px; border: 1px solid #e1e8f0; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>☀️ 녹동고 3-1 대시보드</h2>

    <div class="setting-box">
        <div class="input-row">
            <input type="number" id="studentId" placeholder="학번 4자리 (예: 3114)">
            <button class="btn-confirm" onclick="updateByStudentId()">확인</button>
        </div>
    </div>

    <span class="section-title">📅 나의 맞춤 시간표</span>
    <div class="timetable-card">
        <table class="timetable">
            <tbody id="timetable-content"></tbody>
        </table>
    </div>

    <span class="section-title">🍱 오늘의 급식</span>
    <div class="meal-box" id="meal">불러오는 중...</div>

    <span class="section-title">💬 자유 게시판 (구글 로그인)</span>
    <div class="board-box">
        <div id="disqus_thread"></div>
    </div>
</div>

<script>
// --- 기존 시간표 및 급식 로직 ---
async function loadDataAndRender(studentId) {
    try {
        const [resTime, resMap] = await Promise.all([fetch('표학급시간.csv'), fetch('시간표대응.csv')]);
        const timeText = await resTime.text();
        const mapText = await resMap.text();

        const mapRows = mapText.split('\n').map(r => r.split(','));
        const subjectNames = mapRows[0].map(s => s.trim());
        const mySubjects = {};

        for (let i = 1; i < mapRows.length; i++) {
            const row = mapRows[i];
            const groupName = row[0] ? row[0].trim() : "";
            if (!groupName) continue;
            for (let j = 1; j < row.length; j++) {
                const studentList = (row[j] || "").match(/\d{4}/g);
                if (studentList && studentList.includes(studentId)) {
                    mySubjects[groupName] = subjectNames[j];
                    break;
                }
            }
        }

        const timeRows = timeText.split('\n').map(r => r.split(','));
        let html = "<tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr>";
        for (let p = 1; p <= 7; p++) {
            html += `<tr><td>${p}</td>`;
            for (let d = 1; d <= 5; d++) {
                let rawSub = timeRows[p] && timeRows[p][d] ? timeRows[p][d].trim() : "-";
                const finalSub = mySubjects[rawSub] || rawSub;
                const matchClass = mySubjects[rawSub] ? 'class="is-matched"' : '';
                html += `<td ${matchClass}>${finalSub}</td>`;
            }
            html += `</tr>`;
        }
        document.getElementById("timetable-content").innerHTML = html;
    } catch (e) { console.error(e); }
}

function updateByStudentId() {
    const id = document.getElementById("studentId").value;
    if (id.length === 4) { localStorage.setItem("ndhs_id", id); location.reload(); }
}

async function updateMeal() {
    const d = new Date();
    const dateStr = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
    try {
        const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=Q10&SD_SCHUL_CODE=8490270&MLSV_YMD=${dateStr}&MMEAL_SC_CODE=2`);
        const data = await res.json();
        document.getElementById("meal").innerHTML = data.mealServiceDietInfo[1].row[0].DDISH_NM.replace(/\([0-9.]+\)/g, "").split('<br/>').join('<br>');
    } catch { document.getElementById("meal").innerText = "급식 정보 없음"; }
}

// --- Disqus 설정 로직 ---
var disqus_config = function () {
    this.page.url = window.location.href;  
    this.page.identifier = 'nokdong-3-1-board'; 
};

(function() { 
    var d = document, s = d.createElement('script');
    s.src = 'https://YOUR_SHORTNAME.disqus.com/embed.js'; // YOUR_SHORTNAME을 실제 생성한 이름으로 바꾸세요!
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
})();

window.onload = () => {
    const saved = localStorage.getItem("ndhs_id");
    if(saved) { document.getElementById("studentId").value = saved; loadDataAndRender(saved); }
    updateMeal();
};
</script>
</body>
</html>
