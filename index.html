<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>녹동고 학급 홈페이지</title>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f2f4f7; padding: 20px; display: flex; justify-content: center; margin: 0;
        }
        .container { width: 100%; max-width: 420px; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 15px; font-size: 1.3rem; }

        /* 학번 입력 영역 */
        .setting-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .setting-group input { flex: 2; padding: 12px; border-radius: 12px; border: 1px solid #e1e8f0; font-size: 1rem; outline: none; }
        .setting-group button { flex: 1; background: #007AFF; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .section-title { font-weight: 700; color: #333; margin-bottom: 12px; display: block; font-size: 1.1rem; }
        
        .timetable-card { background: #fff; border: 1px solid #e1e8f0; border-radius: 18px; padding: 15px; margin-bottom: 30px; }
        .timetable { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.85rem; table-layout: fixed; }
        .timetable th { background: #f8faff; color: #007AFF; padding: 8px 2px; border-bottom: 2px solid #e1e8f0; }
        .timetable td { padding: 10px 2px; border-bottom: 1px solid #f0f0f0; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .current-day { background-color: #f0f7ff; font-weight: bold; color: #007AFF !important; border-radius: 8px; }

        .date-group { display: flex; gap: 8px; margin-bottom: 15px; background: #f0f0f0; padding: 6px; border-radius: 16px; }
        .date-group button { flex: 1; padding: 10px 0; border: none; border-radius: 12px; background-color: transparent; color: #666; font-weight: 600; cursor: pointer; }
        .date-group button.active { background-color: #ffffff; color: #007AFF; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .date-group button span { display: block; font-size: 10px; opacity: 0.7; }

        .meal-type-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .meal-type-group button { flex: 1; padding: 8px 0; border: 1px solid #e1e8f0; border-radius: 10px; background: white; color: #888; cursor: pointer; font-size: 14px; }
        .meal-type-group button.active { background: #007AFF; color: white; border-color: #007AFF; font-weight: bold; }

        .info-box { padding: 20px; background: #f8faff; border-radius: 18px; border: 1px solid #e1e8f0; min-height: 100px; }
        #meal { line-height: 1.8; color: #444; font-size: 1.05rem; }
        .no-meal { color: #999; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="mainTitle">☀️ 녹동고등학교</h2>

    <div class="setting-group">
        <input type="number" id="studentId" placeholder="학번 4자리 (예: 3415)" maxlength="4">
        <button onclick="updateByStudentId()">확인</button>
    </div>

    <span class="section-title">📅 <span id="classInfo">반을 입력해주세요</span> 시간표</span>
    <div class="timetable-card">
        <table class="timetable">
            <thead>
                <tr>
                    <th style="width:15%">교시</th>
                    <th id="day1">월</th><th id="day2">화</th><th id="day3">수</th><th id="day4">목</th><th id="day5">금</th>
                </tr>
            </thead>
            <tbody id="timetable-content"></tbody>
        </table>
    </div>

    <span class="section-title" id="mealMainTitle">🍱 오늘의 급식</span>
    <div class="date-group">
        <button type="button" onclick="changeDate(-1)">
            <span>이전날</span><div id="prevDateText">0.0</div>
        </button>
        <button type="button" class="active" onclick="changeDate(0)">
            <span>선택됨</span><div id="todayDateText">0.0</div>
        </button>
        <button type="button" onclick="changeDate(1)">
            <span>다음날</span><div id="nextDateText">0.0</div>
        </button>
    </div>

    <div class="meal-type-group">
        <button type="button" id="type1" onclick="changeMealType(1)">조식</button>
        <button type="button" id="type2" class="active" onclick="changeMealType(2)">중식</button>
        <button type="button" id="type3" onclick="changeMealType(3)">석식</button>
    </div>

    <div class="info-box">
        <div id="meal">학번 입력 후 확인을 눌러주세요.</div>
    </div>
</div>

<script>
const OFFICE_CODE = "Q10";
const SCHOOL_CODE = "8490270";

let GRADE = "3";
let CLASS_NM = "1";
let currentOffset = 0;
let currentType = 2; 

// 학번 입력 및 파싱
function updateByStudentId() {
    const idInput = document.getElementById("studentId").value;
    
    if (idInput.length !== 4) {
        alert("학번 4자리를 입력해주세요! (예: 3415)");
        return;
    }

    GRADE = idInput.substring(0, 1);
    const classVal = parseInt(idInput.substring(1, 2));

    if (classVal > 4 || classVal < 1) {
        alert("녹동고는 1~4반까지만 조회가 가능합니다.");
        return;
    }

    CLASS_NM = classVal.toString();
    localStorage.setItem("ndhs_student_id", idInput);
    
    document.getElementById("classInfo").innerText = `${GRADE}학년 ${CLASS_NM}반`;
    updateDisplay();
}

async function updateDisplay() {
    const baseDate = new Date();
    baseDate.setDate(baseDate.getDate() + currentOffset);
    const dateStr = baseDate.getFullYear() + String(baseDate.getMonth() + 1).padStart(2, '0') + String(baseDate.getDate()).padStart(2, '0');
    
    const days = ["일","월","화","수","목","금","토"];
    document.getElementById("mealMainTitle").innerText = `🍱 ${baseDate.getMonth()+1}/${baseDate.getDate()}(${days[baseDate.getDay()]}) ${["","조식","중식","석식"][currentType]}`;

    const setBtnDate = (id, offset) => {
        const d = new Date(); d.setDate(d.getDate() + currentOffset + offset);
        document.getElementById(id).innerText = `${d.getMonth() + 1}.${d.getDate()}`;
    };
    setBtnDate("prevDateText", -1); setBtnDate("todayDateText", 0); setBtnDate("nextDateText", 1);

    // 오늘 요일 강조
    const realToday = new Date().getDay();
    for(let i=1; i<=5; i++) {
        document.getElementById(`day${i}`).classList.toggle("current-day", i === realToday);
    }

    updateTimetable(baseDate);
    updateMeal(dateStr);
}

async function updateTimetable(baseDate) {
    const tableBody = document.getElementById("timetable-content");
    const currentDay = baseDate.getDay();
    const diff = baseDate.getDate() - currentDay + (currentDay === 0 ? -6 : 1);
    const monday = new Date(baseDate);
    monday.setDate(diff);

    const weekDates = [];
    for(let i=0; i<5; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        weekDates.push(d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0'));
    }

    try {
        const requests = weekDates.map(d => 
            fetch(`https://open.neis.go.kr/hub/hisTimetable?Type=json&ATPT_OFCDC_SC_CODE=${OFFICE_CODE}&SD_SCHUL_CODE=${SCHOOL_CODE}&GRADE=${GRADE}&CLASS_NM=${CLASS_NM}&ALL_TI_YMD=${d}`)
            .then(res => res.json())
        );

        const results = await Promise.all(requests);
        let newContent = "";
        for(let p=1; p<=7; p++) {
            let rowHtml = `<tr><td>${p}</td>`;
            for(let d=0; d<5; d++) {
                const dayData = results[d].hisTimetable;
                let subject = "-";
                if(dayData && dayData[1] && dayData[1].row) {
                    const periodData = dayData[1].row.find(r => parseInt(r.PERIO) === p);
                    if(periodData) subject = periodData.ITRT_CNTNT.replace(/\[.*\]/, "");
                }
                rowHtml += `<td>${subject}</td>`;
            }
            rowHtml += `</tr>`;
            newContent += rowHtml;
        }
        tableBody.innerHTML = newContent;
    } catch (e) {
        tableBody.innerHTML = "<tr><td colspan='6'>데이터 오류</td></tr>";
    }
}

async function updateMeal(dateStr) {
    const mealEl = document.getElementById("meal");
    document.querySelectorAll('.meal-type-group button').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`type${currentType}`).classList.add('active');

    try {
        const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${OFFICE_CODE}&SD_SCHUL_CODE=${SCHOOL_CODE}&MLSV_YMD=${dateStr}&MMEAL_SC_CODE=${currentType}`);
        const data = await res.json();
        if (data.mealServiceDietInfo) {
            let menu = data.mealServiceDietInfo[1].row[0].DDISH_NM.replace(/\([0-9.]+\)/g, "").trim();
            mealEl.innerHTML = menu.split('<br/>').join('<br>');
        } else {
            mealEl.innerHTML = "<div class='no-meal'>등록된 급식 정보가 없습니다.</div>";
        }
    } catch (e) {
        mealEl.innerHTML = "<div class='no-meal'>급식 정보를 불러오지 못했습니다.</div>";
    }
}

function changeDate(offset) {
    currentOffset = (offset === 0) ? 0 : currentOffset + offset;
    updateDisplay();
}

function changeMealType(type) {
    currentType = type;
    updateDisplay();
}

// 초기 로드: 저장된 학번 확인
window.onload = () => {
    const savedId = localStorage.getItem("ndhs_student_id");
    if (savedId) {
        document.getElementById("studentId").value = savedId;
        updateByStudentId();
    }
};
</script>
</body>
</html>
