<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>녹동고 3-1 학급 홈페이지</title>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f2f4f7; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        .container { 
            width: 100%; 
            max-width: 420px; 
            background: white; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; font-size: 1.3rem; }

        .btn-group { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 25px; 
            background: #f0f0f0; 
            padding: 6px;
            border-radius: 16px;
        }
        .btn-group button { 
            flex: 1; 
            padding: 10px 0; 
            border: none; 
            border-radius: 12px; 
            background-color: transparent; 
            color: #666;
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer; 
        }
        .btn-group button span { 
            display: block; 
            font-size: 11px; 
            font-weight: 400; 
            margin-bottom: 2px;
            opacity: 0.7;
        }
        .btn-group button.active { 
            background-color: #ffffff; 
            color: #007AFF; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .info-box { 
            padding: 20px; 
            background: #f8faff; 
            border-radius: 18px; 
            border: 1px solid #e1e8f0;
        }
        .label { font-weight: 700; color: #007AFF; margin-bottom: 15px; display: block; font-size: 1.1rem; }
        #meal { line-height: 1.8; min-height: 100px; color: #444; font-size: 1.05rem; }
        .no-meal { color: #999; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="dateDisplay">날짜 로딩 중...</h2>

    <div class="btn-group">
        <button id="prevBtn" onclick="changeDate(-1)">
            <span>이전날</span>
            <div id="prevDateText">0.00</div>
        </button>
        <button id="todayBtn" class="active" onclick="changeDate(0)">
            <span>선택됨</span>
            <div id="todayDateText">0.00</div>
        </button>
        <button id="nextBtn" onclick="changeDate(1)">
            <span>다음날</span>
            <div id="nextDateText">0.00</div>
        </button>
    </div>

    <div class="info-box">
        <span class="label">🍱 오늘의 급식 메뉴</span>
        <div id="meal">데이터를 불러오는 중...</div>
    </div>
</div>

<script>
let currentOffset = 0;

function updateDisplay() {
    const baseDate = new Date();
    baseDate.setDate(baseDate.getDate() + currentOffset);

    const days = ["일","월","화","수","목","금","토"];
    const dayDisplay = days[baseDate.getDay()];
    document.getElementById("dateDisplay").innerText = 
        `${baseDate.getFullYear()}. ${baseDate.getMonth() + 1}. ${baseDate.getDate()}. (${dayDisplay})`;

    const setBtnDate = (elementId, offset) => {
        const d = new Date();
        d.setDate(d.getDate() + currentOffset + offset);
        const m = d.getMonth() + 1;
        const date = d.getDate();
        document.getElementById(elementId).innerText = `${m}.${date}`;
    };

    setBtnDate("prevDateText", -1);
    setBtnDate("todayDateText", 0);
    setBtnDate("nextDateText", 1);

    const dateStr = `${baseDate.getFullYear()}${String(baseDate.getMonth() + 1).padStart(2, '0')}${String(baseDate.getDate()).padStart(2, '0')}`;
    const mealEl = document.getElementById("meal");
    mealEl.innerHTML = "<div class='no-meal'>메뉴를 가져오는 중... 🔍</div>";
    
    // 알려주신 코드 반영: Q10(경남), 8490270(녹동고)
    const officeCode = "Q10";
    const schoolCode = "8490270";

    fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${officeCode}&SD_SCHUL_CODE=${schoolCode}&MLSV_YMD=${dateStr}`)
        .then(res => res.json())
        .then(data => {
            if (data.mealServiceDietInfo) {
                let menu = data.mealServiceDietInfo[1].row[0].DDISH_NM;
                // 알레르기 번호 제거 및 특수문자 정리
                menu = menu.replace(/\([0-9.]+\)/g, "").trim();
                mealEl.innerHTML = menu.split('<br/>').join('<br>');
            } else {
                mealEl.innerHTML = "<div class='no-meal'>급식 정보가 없습니다. 🏖️</div>";
            }
        })
        .catch(err => {
            mealEl.innerHTML = "<div class='no-meal'>데이터 로딩 실패 😢</div>";
        });
}

function changeDate(offset) {
    if (offset === 0) currentOffset = 0;
    else currentOffset += offset;
    updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
